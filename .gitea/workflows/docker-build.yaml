name: Build Docker Image

on:
  # Автоматическая сборка при релизе (создание tag вида v*)
  push:
    tags:
      - 'v*'
    branches:
      - main

  # Ручной запуск с возможностью указать NEXT_BASE_PATH
  workflow_dispatch:
    inputs:
      next_base_path:
        description: 'NEXT_BASE_PATH (e.g. /taskflow — leave empty for root)'
        required: false
        default: ''
        type: string
      build_type:
        description: 'Build type (test/dev/release)'
        required: false
        default: test
        type: choice
        options:
          - test
          - dev
          - release

env:
  REGISTRY: registry.mrekin.ru
  IMAGE_NAME: ${{ gitea.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.ACTIONS_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract repository name (lowercase)
        id: repo
        run: |
          REPO_LOWER=$(echo "${{ gitea.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Determine image tag
        id: meta
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": "([^"]+)".*/\1/')
          VERSION="${VERSION#v}"
          if [ "${{ gitea.event_name }}" = "push" ]; then
            if [ "${GITEA_REF#refs/tags/}" != "${GITEA_REF}" ]; then
              BUILD_TYPE=release
              TAG="${GITEA_REF#refs/tags/v}"
              TAGS="${{ steps.repo.outputs.image }}:${TAG}"$'\n'"${{ steps.repo.outputs.image }}:latest"
              BASE_PATH=""
            else
              if git diff --name-only ${{ gitea.event.before }} ${{ gitea.event.after }} | grep -q "package.json"; then
                if git diff ${{ gitea.event.before }} ${{ gitea.event.after }} package.json | grep -q '"version"'; then
                  BUILD_TYPE=dev
                  TAGS="${{ steps.repo.outputs.image }}:${VERSION}-dev"$'\n'"${{ steps.repo.outputs.image }}:test"
                else
                  BUILD_TYPE=test
                  TAGS="${{ steps.repo.outputs.image }}:test"
                fi
              else
                BUILD_TYPE=test
                TAGS="${{ steps.repo.outputs.image }}:test"
              fi
              BASE_PATH="/taskflow"
            fi
          else
            BUILD_TYPE="${{ inputs.build_type }}"
            if [ "$BUILD_TYPE" = "release" ]; then
              TAGS="${{ steps.repo.outputs.image }}:${VERSION}"$'\n'"${{ steps.repo.outputs.image }}:latest"
            elif [ "$BUILD_TYPE" = "dev" ]; then
              TAGS="${{ steps.repo.outputs.image }}:${VERSION}-dev"$'\n'"${{ steps.repo.outputs.image }}:test"
            else
              TAGS="${{ steps.repo.outputs.image }}:test"
            fi
            BASE_PATH="${{ inputs.next_base_path }}"
          fi
          echo "tag<<EOF" >> "$GITHUB_OUTPUT"
          echo "${TAGS}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_BASE_PATH=${{ steps.meta.outputs.base_path }}
            BUILD_TYPE=${{ steps.meta.outputs.build_type }}
          cache-from: type=registry,ref=${{ steps.repo.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.repo.outputs.image }}:buildcache,mode=max
