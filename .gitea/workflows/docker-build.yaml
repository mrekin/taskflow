name: Build Docker Image

on:
  # Автоматическая сборка при релизе (создание tag вида v*)
  push:
    tags:
      - 'v*'

  # Ручной запуск с возможностью указать NEXT_BASE_PATH
  workflow_dispatch:
    inputs:
      next_base_path:
        description: 'NEXT_BASE_PATH (e.g. /taskflow — leave empty for root)'
        required: false
        default: ''
        type: string
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ${{ gitea.server }}
  IMAGE_NAME: ${{ gitea.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: meta
        run: |
          if [ "${{ gitea.event_name }}" = "push" ]; then
            # Release tag (e.g. v1.2.3) — strip the 'v' prefix
            TAG="${GITEA_REF#refs/tags/v}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG="latest"
            fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "base_path=${{ inputs.next_base_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Extract repository name (lowercase)
        id: repo
        run: |
          # Gitea repository is in "owner/repo" format
          REPO="${{ gitea.repository }}"
          # Lowercase for Docker compatibility
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.repo.outputs.image }}:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_BASE_PATH=${{ steps.meta.outputs.base_path }}
