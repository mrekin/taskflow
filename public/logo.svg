<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Checkmark box -->
  <rect x="7" y="6" width="18" height="18" rx="3" stroke="white" stroke-width="1.8" fill="none"/>
  <!-- Checkmark -->
  <path d="M12 15.5l3 3 6-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small note lines at bottom -->
  <line x1="11" y1="22" x2="17" y2="22" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="24.5" x2="15" y2="24.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <!-- Floating note indicator -->
  <rect x="19" y="18" width="8" height="8" rx="2" fill="white" opacity="0.9"/>
  <line x1="20.5" y1="20.5" x2="25.5" y2="20.5" stroke="#6366f1" stroke-width="1" stroke-linecap="round"/>
  <line x1="20.5" y1="22.5" x2="24" y2="22.5" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="20.5" y1="24.5" x2="23" y2="24.5" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
