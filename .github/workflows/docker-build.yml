name: Build Docker Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      next_base_path:
        description: 'NEXT_BASE_PATH (e.g. /taskflow — leave empty for root)'
        required: false
        default: ''
        type: string
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: latest
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name (lowercase)
        id: repo
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Determine image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
              TAG="${GITHUB_REF#refs/tags/v}"
              echo "tag=${{ steps.repo.outputs.image }}:${TAG}" >> "$GITHUB_OUTPUT"
              echo "base_path=" >> "$GITHUB_OUTPUT"
            else
              TAGS="${{ steps.repo.outputs.image }}:test"
              if git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "package.json"; then
                VERSION=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": "([^"]+)".*/\1/')
                TAGS="${TAGS}"$'\n'"${{ steps.repo.outputs.image }}:${VERSION}-dev"
              fi
              echo "tag<<EOF" >> "$GITHUB_OUTPUT"
              echo "${TAGS}" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
              echo "base_path=/taskflow" >> "$GITHUB_OUTPUT"
            fi
          else
            TAG="${{ inputs.tag }}"
            [ -z "$TAG" ] && TAG="latest"
            echo "tag=${{ steps.repo.outputs.image }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "base_path=${{ inputs.next_base_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_BASE_PATH=${{ steps.meta.outputs.base_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
