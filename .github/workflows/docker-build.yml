name: Build Docker Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      next_base_path:
        description: 'NEXT_BASE_PATH (e.g. /taskflow — leave empty for root)'
        required: false
        default: ''
        type: string
      build_type:
        description: 'Build type (test/dev/release)'
        required: false
        default: test
        type: choice
        options:
          - test
          - dev
          - release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name (lowercase)
        id: repo
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Determine image tag
        id: meta
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version": "([^"]+)".*/\1/')
          VERSION="${VERSION#v}"
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
              BUILD_TYPE=release
              TAG="${GITHUB_REF#refs/tags/v}"
              TAGS="${{ steps.repo.outputs.image }}:${TAG}"$'\n'"${{ steps.repo.outputs.image }}:latest"
              BASE_PATH=""
            else
              if git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "package.json"; then
                if git diff ${{ github.event.before }} ${{ github.event.after }} package.json | grep -q '"version"'; then
                  BUILD_TYPE=dev
                  TAGS="${{ steps.repo.outputs.image }}:${VERSION}-dev"
                else
                  BUILD_TYPE=test
                  TAGS="${{ steps.repo.outputs.image }}:test"
                fi
              else
                BUILD_TYPE=test
                TAGS="${{ steps.repo.outputs.image }}:test"
              fi
              BASE_PATH="/taskflow"
            fi
          else
            BUILD_TYPE="${{ inputs.build_type }}"
            if [ "$BUILD_TYPE" = "release" ]; then
              TAGS="${{ steps.repo.outputs.image }}:${VERSION}"$'\n'"${{ steps.repo.outputs.image }}:latest"
            elif [ "$BUILD_TYPE" = "dev" ]; then
              TAGS="${{ steps.repo.outputs.image }}:${VERSION}-dev"
            else
              TAGS="${{ steps.repo.outputs.image }}:test"
            fi
            BASE_PATH="${{ inputs.next_base_path }}"
          fi
          echo "tag<<EOF" >> "$GITHUB_OUTPUT"
          echo "${TAGS}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_BASE_PATH=${{ steps.meta.outputs.base_path }}
            BUILD_TYPE=${{ steps.meta.outputs.build_type }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
