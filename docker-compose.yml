services:
  taskflow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set subpath if deploying behind a proxy (e.g., "/app")
        NEXT_BASE_PATH: "/taskflow"
    container_name: taskflow
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DEMO_MODE=true
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/taskflow.db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-me-in-production-use-openssl-rand-base64-32
      # Custom status columns for Kanban (optional - "Label:color" pairs, comma-separated; ID is auto-generated from label)
      # - KANBAN_COLUMNS=To Do:#94a3b8,In Progress:#3b82f6,Review:#f59e0b,Done:#22c55e,Cancelled:#ef4444
      # OIDC Configuration (optional - uncomment and configure)
      # - OIDC_ISSUER=https://your-keycloak.com/realms/your-realm
      # - OIDC_CLIENT_ID=taskflow
      # - OIDC_CLIENT_SECRET=your-client-secret
    volumes:
      - ./taskflow-data:/app/db

volumes:
  taskflow-data:
